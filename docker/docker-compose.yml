services:
  dualvla:
#    build:
#      context: .
#      dockerfile: Dockerfile
#      args:
#        HF_TOKEN: ${HF_TOKEN}
    image: farshadnh/dualvla:latest
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - MUJOCO_GL=egl
      - MUJOCO_EGL_DEVICE_ID=0
      - CUDA_VISIBLE_DEVICES=0
      - PYOPENGL_PLATFORM=egl
      - HF_TOKEN=<HF_TOKEN>
    volumes:
      - /home/farshad/pi0:/workspace
    stdin_open: true
    tty: true
    network_mode: host
    # user: "1002:1002"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
